<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Risk Consent & KYC — PPG Trading Club</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <style>
    :root {
      --navy: #040d1c;
      --navy2: #071428;
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --white: #ffffff;
      --grey: #94a3b8;
      --grey2: #64748b;
      --border: rgba(255, 255, 255, 0.06);
      --green: #22c55e;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Outfit', sans-serif; background: var(--navy); color: var(--white); min-height: 100vh; line-height: 1.6; }
    .nav { display: flex; align-items: center; justify-content: space-between; padding: 0 5%; height: 70px; background: rgba(4, 13, 28, 0.95); border-bottom: 1px solid var(--border); }
    .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav-logo img { height: 36px; width: 36px; object-fit: contain; border-radius: 8px; }
    .logo-text { display: flex; flex-direction: column; line-height: 1.1; }
    .logo-text span:first-child { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; font-weight: 700; color: var(--white); }
    .logo-text span:last-child { font-size: 0.6rem; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; }
    .main { padding: 60px 5%; display: flex; justify-content: center; }
    .consent-wrap { max-width: 640px; width: 100%; }
    .submit-btn { width: 100%; background: var(--gold); color: #0a0a0a; border: none; border-radius: 10px; padding: 16px; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 24px; transition: background 0.2s; }
    .submit-btn:hover { background: var(--gold-light); }
    .submit-btn:disabled { background: var(--grey2); cursor: not-allowed; }
  </style>
</head>
<body>

<nav class="nav">
  <a href="index.html" class="nav-logo">
    <img src="logo.png" alt="PPG" onerror="this.style.display='none'">
    <div class="logo-text">
      <span>PPG Trading Club</span>
      <span>Penny Partners Group</span>
    </div>
  </a>
</nav>

<div class="main">
  <div class="consent-wrap">
    <h2>Risk Acknowledgement & Onboarding Consent</h2>
    <p style="color: var(--grey); margin: 15px 0 30px;">Please read and accept the terms to complete your application submission node.</p>
    
    <button id="consentSubmit" onclick="handleConsentSubmission()" class="submit-btn">
      Submit Agreement & Finalize Application →
    </button>
  </div>
</div>

<script>
const { createClient } = supabase;
const sb = createClient(
  window.PPG_CONFIG.SUPABASE_URL,
  window.PPG_CONFIG.SUPABASE_ANON_KEY
);

async function handleConsentSubmission() {
  const btn = document.getElementById('consentSubmit');
  btn.disabled = true;
  btn.textContent = 'Processing parameters...';

  try {
    const d = JSON.parse(sessionStorage.getItem('ppg_reg'));
    if (!d) throw new Error('Registration cache trace missing.');

    const { data: { user } } = await sb.auth.getUser();
    if (!user) throw new Error('User context dropped.');

    // Save profile to Supabase
    const { error } = await sb
      .from('profiles')
      .update({
        full_name: d.name,
        phone: d.phone || null,
        country: d.country || null,
        role: d.role || 'Trader',
        risk_tier: d.risk || null,
        referral_id: d.myReferralId || null,
        referred_by: d.referral || null,
        payment_method: d.payMethod || null,
        payment_reference: d.txRef || null,
        kyc_status: 'pending',
        registration_status: 'submitted'
      })
      .eq('id', user.id);

    if (error) throw error;

    // Transition straight to complete file layout
    window.location.href = 'complete.html';

  } catch (e) {
    alert(e.message || 'Error executing consent updates.');
    btn.disabled = false;
    btn.textContent = 'Submit Agreement & Finalize Application →';
  }
}
</script>
</body>
</html>
