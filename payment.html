<script>
const { createClient } = supabase;
const sb = createClient(
  window.PPG_CONFIG.SUPABASE_URL,
  window.PPG_CONFIG.SUPABASE_ANON_KEY
);

// Load member name
window.addEventListener('load', function () {
  try {
    const d = JSON.parse(sessionStorage.getItem('ppg_reg'));
    if (d && d.name) {
      document.getElementById('member-name').textContent =
        d.name + ' — ' + d.risk + ' Tier';
    }
  } catch (e) {}
});

// Tabs
function switchTab(id, btn) {
  document.querySelectorAll('.pay-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.pay-tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
  btn.classList.add('active');

  const map={
    opay:'Opay',
    zenith:'Zenith Bank',
    btc:'Bitcoin (BTC)',
    eth:'Ethereum (ETH)',
    usdt:'USDT TRC20'
  };
  document.getElementById('pay-method').value=map[id]||'';
}

// Copy
function copyText(text,btn){
  navigator.clipboard.writeText(text).then(()=>{
    const orig=btn.textContent;
    btn.textContent='✓ Copied';
    btn.classList.add('copied');
    showToast();
    setTimeout(()=>{
      btn.textContent=orig;
      btn.classList.remove('copied');
    },2000);
  });
}

function showToast(){
  const t=document.getElementById('toast');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

// File upload preview
function handleFile(input){
  if(input.files && input.files[0]){
    const file=input.files[0];
    document.getElementById('uploadArea').classList.add('has-file');
    document.getElementById('fileName').textContent=file.name;
    document.getElementById('filePreview').classList.add('show');
  }
}

function removeFile(){
  document.getElementById('receipt-file').value='';
  document.getElementById('uploadArea').classList.remove('has-file');
  document.getElementById('filePreview').classList.remove('show');
}

// REAL SUBMIT
async function handleSubmit(){

  const method=document.getElementById('pay-method').value;
  const ref=document.getElementById('tx-ref').value.trim();
  const file=document.getElementById('receipt-file').files[0];

  if(!method){
    alert('Select payment method');
    return;
  }

  if(!ref){
    alert('Enter transaction reference');
    return;
  }

  if(!file){
    alert('Upload receipt');
    return;
  }

  const btn=document.querySelector('.submit-btn');
  btn.disabled=true;
  btn.textContent='Uploading...';

  try{

    const reg=JSON.parse(sessionStorage.getItem('ppg_reg'));

    if(!reg || !reg.memberId){
      throw new Error('Registration session missing.');
    }

    // Upload receipt
    const fileExt=file.name.split('.').pop();
    const fileName=`${reg.memberId}-${Date.now()}.${fileExt}`;

    const { error: uploadErr } =
      await sb.storage
      .from('receipts')
      .upload(fileName,file);

    if(uploadErr) throw uploadErr;

    // Get file path
    const receiptPath=`receipts/${fileName}`;

    // Update profile
    const { error:updateErr }=
      await sb
      .from('profiles')
      .update({
        payment_method:method,
        payment_reference:ref,
        payment_receipt:receiptPath,
        payment_status:'pending',
        payment_submitted_at:new Date().toISOString()
      })
      .eq('id',reg.memberId);

    if(updateErr) throw updateErr;

    // Save local
    reg.payMethod=method;
    reg.txRef=ref;
    reg.paymentStatus='pending';

    sessionStorage.setItem(
      'ppg_reg',
      JSON.stringify(reg)
    );

    window.location.href='consent.html';

  }catch(err){
    alert(err.message || 'Payment upload failed.');
    btn.disabled=false;
    btn.textContent='Continue to Risk Consent →';
  }
}
</script>
