<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPG Solutions | Subscription Payment</title>
    <style>
        :root { --bg: #090B0E; --card: #12161A; --blue: #0066FF; --gold: #E5B842; --text: #F5F7FA; --muted: #8A94A6; --border: #1F262E; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        .card { background-color: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        h2 { font-size: 16px; font-weight: 700; margin-bottom: 12px; }
        .price { font-size: 20px; color: var(--gold); font-weight: 700; margin-bottom: 16px; }
        .payment-row { background: rgba(0,0,0,0.2); padding: 12px; border-radius: 6px; border: 1px solid var(--border); margin-bottom: 12px; font-size: 13px; }
        .copy-trigger { color: var(--blue); float: right; cursor: pointer; font-weight: 600; }
        .btn { display: block; width: 100%; background-color: var(--blue); color: #FFF; text-align: center; padding: 16px; border-radius: 8px; text-decoration: none; font-weight: 600; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>Active Monthly Commitment Allocation</h2>
            <div class="price">$3.99 USD <span style="font-size:12px; color:var(--muted);">Every 30 Days</span></div>
            <p style="font-size:13px; color:var(--muted); margin-bottom:16px;">Remit payment to any corporate channel address option below to renew your monthly license validation tracker.</p>
            
            <div class="payment-row">
                <strong>OPAY Bank Account:</strong><br>8130500659 (Godwin)
                <span class="copy-trigger" onclick="navigator.clipboard.writeText('8130500659')">Copy</span>
            </div>
            <div class="payment-row">
                <strong>USDT Tether (TRC20):</strong><br>TR7NHqjeKQxGTCi8q8DE4p1nR...
                <span class="copy-trigger" onclick="navigator.clipboard.writeText('TR7NHqjeKQxGTCi8q8DE4p1nR')">Copy</span>
            </div>
        </div>
        <a href="consent.html" class="btn">Confirm Payment Submission</a>
    </div>
</body>
</html>
