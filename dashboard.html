<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Member Dashboard — PPG Global</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght=300;400;500;600;700&family=JetBrains+Mono:wght=400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <style>
    :root {
      --bg:        #eef0f4;
      --sidebar:   #0f1824;
      --sidebar2:  #161f2e;
      --panel:     #ffffff;
      --gold:      #c9a84c;
      --gold-lt:   rgba(201,168,76,0.12);
      --gold-bdr:  rgba(201,168,76,0.3);
      --text:      #111827;
      --muted:     #6b7280;
      --muted2:    #9ca3af;
      --border:    #e5e7eb;
      --sidebar-w: 260px;
      --green:     #059669;
      --green-bg:  rgba(5,150,105,0.08);
      --orange:    #d97706;
      --orange-bg: rgba(217,119,6,0.08);
      --red:       #dc2626;
      --red-bg:    rgba(220,38,38,0.08);
      --s-text:    #94a3b8;
      --s-muted:   #475569;
      --s-active:  rgba(255,255,255,0.06);
      --s-border:  rgba(255,255,255,0.06);
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      background-image: radial-gradient(circle at 1px 1px, rgba(0,0,0,0.04) 1px, transparent 0);
      background-size: 24px 24px;
      color: var(--text);
      display: flex;
      min-height: 100vh;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }

    /* ══ SIDEBAR ════════════════════════════════════════ */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--sidebar);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 200;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .sb-profile {
      padding: 24px 20px 20px;
      border-bottom: 1px solid var(--s-border);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: background 0.15s;
    }
    .sb-profile:hover { background: var(--s-active); }
    .sb-avatar {
      width: 40px; height: 40px;
      background: var(--gold);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 15px; color: #0f1824;
      flex-shrink: 0;
      position: relative;
    }
    .sb-profile-info { flex-grow: 1; min-width: 0; }
    .sb-name {
      font-size: 13.5px;
      font-weight: 600;
      color: #f1f5f9;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sb-id {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--s-muted);
      margin-top: 2px;
    }
    .sb-chevron {
      color: var(--s-muted);
      transition: transform 0.2s;
    }
    .sb-chevron svg { width: 14px; height: 14px; }

    .sb-logo {
      padding: 20px 20px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--s-border);
      margin-bottom: 4px;
    }
    .sb-logo-icon {
      width: 28px; height: 28px;
      background: var(--gold);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .sb-logo-icon svg { width: 14px; height: 14px; }
    .sb-logo-text { font-size: 14px; font-weight: 700; color: #f1f5f9; letter-spacing: -0.01em; }
    .sb-logo-sub { font-size: 9px; color: var(--s-muted); letter-spacing: 0.08em; text-transform: uppercase; }

    .sb-nav { padding: 12px 0; flex-grow: 1; }
    .sb-section-label {
      font-size: 9.5px;
      font-weight: 600;
      color: var(--s-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 12px 20px 6px;
    }

    .sb-item { position: relative; }
    .sb-link {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 10px 20px;
      color: var(--s-text);
      text-decoration: none;
      font-size: 13.5px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
    }
    .sb-link:hover { color: #f1f5f9; background: var(--s-active); }
    .sb-link.active { color: #f1f5f9; background: var(--s-active); }
    .sb-link.active::before {
      content: '';
      position: absolute;
      left: 0; top: 15%; bottom: 15%;
      width: 3px;
      background: var(--gold);
      border-radius: 0 3px 3px 0;
    }
    .sb-link svg { width: 15px; height: 15px; flex-shrink: 0; opacity: 0.75; }
    .sb-link.active svg, .sb-link:hover svg { opacity: 1; }
    .sb-link .chevron {
      margin-left: auto;
      transition: transform 0.2s;
      opacity: 0.5;
    }
    .sb-link .chevron svg { width: 12px; height: 12px; }
    .sb-link.open .chevron { transform: rotate(180deg); }

    .sb-dropdown {
      display: none;
      background: rgba(0,0,0,0.15);
    }
    .sb-dropdown.open { display: block; }
    .sb-sub-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 20px 9px 44px;
      color: var(--s-muted);
      text-decoration: none;
      font-size: 12.5px;
      font-weight: 400;
      transition: all 0.15s;
      cursor: pointer;
    }
    .sb-sub-link:hover { color: #f1f5f9; background: var(--s-active); }
    .sb-sub-link svg { width: 13px; height: 13px; opacity: 0.6; }

    .sb-footer {
      border-top: 1px solid var(--s-border);
      padding: 12px 0;
    }

    /* ══ MAIN ══════════════════════════════════════════ */
    .main {
      margin-left: var(--sidebar-w);
      flex-grow: 1;
      min-height: 100vh;
    }

    .topbar {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .topbar-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }
    .topbar-right { display: flex; align-items: center; gap: 12px; }

    .icon-btn {
      width: 36px; height: 36px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: transparent;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      position: relative;
      transition: border-color 0.15s, background 0.15s;
    }
    .icon-btn:hover { border-color: var(--gold-bdr); background: var(--gold-lt); }
    .icon-btn svg { width: 15px; height: 15px; color: var(--muted); }
    .notify-dot {
      width: 7px; height: 7px;
      background: var(--red);
      border-radius: 50%;
      position: absolute;
      top: 7px; right: 7px;
      border: 1.5px solid white;
      display: none;
    }

    .status-pill {
      padding: 5px 13px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid transparent;
    }
    .status-pill.verified   { background: var(--green-bg);  color: var(--green);  border-color: rgba(5,150,105,0.25); }
    .status-pill.pending    { background: var(--orange-bg); color: var(--orange); border-color: rgba(217,119,6,0.25); }
    .status-pill.unverified { background: var(--red-bg);    color: var(--red);    border-color: rgba(220,38,38,0.25); }

    /* ══ PAGE CONTENT ══════════════════════════════════ */
    .page { padding: 28px 32px; display: none; }
    .page.active { display: block; }

    /* ══ BALANCE CARD (hero) ═══════════════════════════ */
    .balance-hero {
      background: var(--sidebar);
      border-radius: 14px;
      padding: 28px 32px;
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
    }
    .balance-hero::before {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(201,168,76,0.15) 0%, transparent 70%);
      border-radius: 50%;
    }
    .balance-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--s-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .balance-amount {
      font-size: 36px;
      font-weight: 700;
      color: #f1f5f9;
      letter-spacing: -0.03em;
      font-variant-numeric: tabular-nums;
      margin-bottom: 20px;
    }
    .balance-actions { display: flex; gap: 10px; }

    /* ══ QUICK STAT CARDS ══════════════════════════════ */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 20px;
    }
    .stat-card-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }
    .stat-card-value {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
      font-variant-numeric: tabular-nums;
    }
    .stat-card-value.gold { color: var(--gold); }

    /* ══ CARDS ═════════════════════════════════════════ */
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 20px;
    }
    .card-head {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .card-title { font-size: 14px; font-weight: 600; color: var(--text); }
    .card-body { padding: 20px; }
    .card-body-flush { padding: 0; }

    /* ══ TABLE ═════════════════════════════════════════ */
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th {
      padding: 10px 18px;
      text-align: left;
      font-size: 10.5px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.07em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      background: #fafafa;
    }
    .data-table td {
      padding: 13px 18px;
      font-size: 13.5px;
      color: var(--text);
      border-bottom: 1px solid var(--border);
    }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tbody tr:hover td { background: #fafafa; }
    .data-table .empty-row td {
      color: var(--muted2);
      font-size: 13px;
      text-align: center;
      padding: 32px;
    }

    /* ══ BADGE ═════════════════════════════════════════ */
    .badge {
      display: inline-flex; align-items: center;
      padding: 3px 9px; border-radius: 4px;
      font-size: 11.5px; font-weight: 500;
    }
    .badge-green  { background: var(--green-bg);  color: var(--green); }
    .badge-orange { background: var(--orange-bg); color: var(--orange); }
    .badge-red    { background: var(--red-bg);    color: var(--red); }
    .badge-gold   { background: var(--gold-lt);   color: var(--gold); }

    /* ══ BUTTONS ═══════════════════════════════════════ */
    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 9px 18px; border-radius: 7px;
      font-size: 13px; font-weight: 600;
      cursor: pointer; border: none;
      font-family: 'Outfit', sans-serif;
      letter-spacing: -0.01em;
      transition: all 0.15s;
      text-decoration: none;
    }
    .btn svg { width: 14px; height: 14px; }
    .btn-gold { background: var(--gold); color: #0f1824; }
    .btn-gold:hover { background: #d4b15e; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-outline:hover { border-color: var(--gold-bdr); background: var(--gold-lt); }
    .btn-ghost { background: var(--s-active); color: #f1f5f9; border: 1px solid rgba(255,255,255,0.08); }
    .btn-ghost:hover { background: rgba(255,255,255,0.1); }
    .btn-sm { padding: 7px 14px; font-size: 12px; }
    .btn-danger { background: var(--red-bg); color: var(--red); border: 1px solid rgba(220,38,38,0.2); }
    .btn-danger:hover { background: rgba(220,38,38,0.15); }

    /* ══ FORM ELEMENTS ═════════════════════════════════ */
    .form-group { margin-bottom: 18px; }
    .form-label {
      display: block;
      font-size: 12px; font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.03em;
      margin-bottom: 7px;
      text-transform: uppercase;
    }
    .form-input, .form-select {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: 13.5px;
      outline: none;
      transition: border-color 0.15s;
    }
    .form-input:focus, .form-select:focus { border-color: var(--gold-bdr); background: white; }
    .form-input[readonly] {
      background: #f9fafb;
      color: var(--muted);
      cursor: default;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-hint { font-size: 11.5px; color: var(--muted2); margin-top: 5px; }

    /* Ref link row */
    .ref-input-row {
      display: flex; gap: 8px; align-items: center;
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 4px 4px 4px 12px;
      background: #f9fafb;
    }
    .ref-input-row input {
      flex-grow: 1; border: none; outline: none;
      background: transparent; color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11.5px;
    }

    /* ══ KYC NOTICE ════════════════════════════════════ */
    .kyc-notice {
      display: flex; align-items: flex-start; gap: 14px;
      padding: 16px 18px;
      border-radius: 9px;
      border: 1px solid;
    }
    .kyc-notice.green  { background: var(--green-bg);  border-color: rgba(5,150,105,0.2); }
    .kyc-notice.orange { background: var(--orange-bg); border-color: rgba(217,119,6,0.2); }
    .kyc-notice.red    { background: var(--red-bg);    border-color: rgba(220,38,38,0.2); }
    .kyc-icon { flex-shrink: 0; margin-top: 1px; }
    .kyc-icon svg { width: 18px; height: 18px; }
    .kyc-notice.green  .kyc-icon svg { color: var(--green); }
    .kyc-notice.orange .kyc-icon svg { color: var(--orange); }
    .kyc-notice.red    .kyc-icon svg { color: var(--red); }
    .kyc-notice-title { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
    .kyc-notice.green  .kyc-notice-title { color: var(--green); }
    .kyc-notice.orange .kyc-notice-title { color: var(--orange); }
    .kyc-notice.red    .kyc-notice-title { color: var(--red); }
    .kyc-notice-text { font-size: 12.5px; color: var(--muted); line-height: 1.5; }

    /* ══ PAGE HEADER ═══════════════════════════════════ */
    .page-header { margin-bottom: 24px; }
    .page-header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; }
    .page-header p  { font-size: 13px; color: var(--muted); margin-top: 4px; }

    /* ══ REFERRAL STATS ════════════════════════════════ */
    .ref-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    .ref-stat {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 20px;
      text-align: center;
    }
    .ref-stat-val { font-size: 26px; font-weight: 700; color: var(--text); letter-spacing: -0.03em; }
    .ref-stat-lbl { font-size: 11px; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.05em; }

    /* ══ UTILITY ═══════════════════════════════════════ */
    .flex-between { display: flex; align-items: center; justify-content: space-between; }
    .mb-16 { margin-bottom: 16px; }
    .mb-24 { margin-bottom: 24px; }
    .text-muted { color: var(--muted); font-size: 13px; }
    .text-sm { font-size: 12.5px; }
    .divider { height: 1px; background: var(--border); margin: 20px 0; }

    /* ══ ALERT BANNER ══════════════════════════════════ */
    .alert {
      padding: 14px 18px; border-radius: 8px;
      font-size: 13px; margin-bottom: 20px;
      border: 1px solid;
    }
    .alert-gold { background: var(--gold-lt); border-color: var(--gold-bdr); color: #7a5e1a; }
    .alert-success { background: var(--green-bg); border-color: rgba(5,150,105,0.25); color: var(--green); }

    /* ══ TRANSACTION TYPE ══════════════════════════════ */
    .tx-type {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 12px; font-weight: 500;
    }
    .tx-type.deposit { color: var(--green); }
    .tx-type.withdrawal { color: var(--orange); }
    .tx-type svg { width: 13px; height: 13px; }

    .page.active { animation: fadeUp 0.2s ease; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: none
