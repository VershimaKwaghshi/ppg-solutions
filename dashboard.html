<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — PPG Trading Club</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--navy:#040d1c;--navy2:#071428;--navy3:#0a1a35;--gold:#c9a84c;--gold-light:#e8c97a;--white:#ffffff;--grey:#94a3b8;--grey2:#64748b;--border:rgba(255,255,255,0.06);--red:#ef4444;--green:#22c55e;--blue:#1640d6;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Outfit',sans-serif;background:var(--navy);color:var(--white);min-height:100vh;line-height:1.6;}

/* SIDEBAR */
.layout{display:flex;min-height:100vh;}
.sidebar{width:260px;background:var(--navy2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;transition:transform 0.3s;}
.sidebar.hidden{transform:translateX(-260px);}
.sb-header{padding:24px 20px;border-bottom:1px solid var(--border);}
.sb-logo{display:flex;align-items:center;gap:10px;text-decoration:none;margin-bottom:20px;}
.sb-logo img{height:32px;width:32px;object-fit:contain;border-radius:7px;}
.sb-logo-text{display:flex;flex-direction:column;line-height:1.1;}
.sb-logo-text span:first-child{font-family:'Cormorant Garamond',serif;font-size:0.95rem;font-weight:700;}
.sb-logo-text span:last-child{font-size:0.55rem;color:var(--gold);letter-spacing:2px;text-transform:uppercase;}
.sb-profile{display:flex;align-items:center;gap:12px;}
.sb-avatar{width:42px;height:42px;border-radius:50%;background:rgba(201,168,76,0.15);border:2px solid rgba(201,168,76,0.3);display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:700;color:var(--gold);flex-shrink:0;}
.sb-name{font-weight:600;font-size:0.88rem;margin-bottom:2px;}
.sb-status{font-size:0.65rem;color:var(--green);font-weight:500;display:flex;align-items:center;gap:4px;}
.sb-status::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--green);}
.sb-nav{flex:1;padding:20px 0;overflow-y:auto;}
.nav-section{padding:0 12px;margin-bottom:8px;}
.nav-section-label{font-size:0.62rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--grey2);padding:0 8px;margin-bottom:6px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;transition:all 0.2s;font-size:0.84rem;color:var(--grey);text-decoration:none;margin-bottom:2px;}
.nav-item:hover{background:rgba(255,255,255,0.04);color:var(--white);}
.nav-item.active{background:rgba(201,168,76,0.1);color:var(--gold);font-weight:500;}
.nav-item .ni{font-size:1rem;width:20px;text-align:center;}
.sb-footer{padding:16px 20px;border-top:1px solid var(--border);}
.logout-btn{width:100%;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);color:var(--red);border-radius:8px;padding:10px;font-size:0.82rem;font-weight:500;font-family:'Outfit',sans-serif;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px;}
.logout-btn:hover{background:rgba(239,68,68,0.15);}

/* MAIN */
.main{margin-left:260px;flex:1;display:flex;flex-direction:column;}
.topbar{height:64px;background:rgba(4,13,28,0.95);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 32px;position:sticky;top:0;z-index:50;}
.topbar-left{display:flex;align-items:center;gap:14px;}
.menu-toggle{background:none;border:none;color:var(--grey);cursor:pointer;font-size:1.2rem;display:none;}
.topbar-title{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:700;}
.topbar-right{display:flex;align-items:center;gap:12px;}
.tb-badge{background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.2);color:var(--gold);border-radius:100px;padding:5px 14px;font-size:0.72rem;font-weight:600;}
.wa-link{display:flex;align-items:center;gap:6px;background:#25d366;color:white;border-radius:8px;padding:7px 14px;font-size:0.75rem;font-weight:600;text-decoration:none;transition:all 0.2s;}
.wa-link:hover{background:#1da851;}

/* CONTENT */
.content{padding:32px;flex:1;}

/* TABS */
.tab-content{display:none;}
.tab-content.active{display:block;}

/* WELCOME BANNER */
.welcome-banner{background:linear-gradient(135deg,rgba(22,64,214,0.2) 0%,rgba(201,168,76,0.08) 100%);border:1px solid rgba(201,168,76,0.15);border-radius:16px;padding:28px 32px;margin-bottom:28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;}
.wb-text h2{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:700;margin-bottom:6px;}
.wb-text h2 em{font-style:italic;color:var(--gold);}
.wb-text p{color:var(--grey);font-size:0.85rem;font-weight:300;}
.wb-id{text-align:right;}
.wb-id-label{font-size:0.65rem;color:var(--grey2);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
.wb-id-val{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:700;color:var(--gold);display:flex;align-items:center;gap:8px;}
.copy-id{background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.2);color:var(--gold);padding:3px 10px;border-radius:5px;font-size:0.65rem;font-weight:600;cursor:pointer;transition:all 0.2s;font-family:'Outfit',sans-serif;}
.copy-id:hover{background:rgba(201,168,76,0.2);}

/* STAT CARDS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px;}
.stat-card{background:var(--navy2);border:1px solid var(--border);border-radius:14px;padding:22px;transition:all 0.25s;}
.stat-card:hover{border-color:rgba(255,255,255,0.1);}
.sc-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;margin-bottom:14px;}
.sc-label{font-size:0.72rem;color:var(--grey2);text-transform:uppercase;letter-spacing:1px;font-weight:500;margin-bottom:6px;}
.sc-val{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:700;color:var(--white);line-height:1;}
.sc-sub{font-size:0.72rem;color:var(--grey2);margin-top:4px;}

/* GRID */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-bottom:20px;}

/* CARDS */
.card{background:var(--navy2);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:20px;}
.card-header{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-header h3{font-weight:600;font-size:0.92rem;}
.card-badge{font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:3px 10px;border-radius:100px;}
.badge-pending{background:rgba(245,158,11,0.1);color:#f59e0b;}
.badge-approved{background:rgba(34,197,94,0.1);color:var(--green);}
.badge-review{background:rgba(99,102,241,0.1);color:#818cf8;}
.card-body{padding:24px;}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--border);}
.info-row:last-child{border-bottom:none;}
.ir-label{font-size:0.75rem;color:var(--grey2);}
.ir-val{font-size:0.87rem;font-weight:600;color:var(--white);display:flex;align-items:center;gap:8px;}
.ir-val.gold{color:var(--gold);}
.ir-val.green{color:var(--green);}
.ir-val.pending{color:#f59e0b;}

/* MT5 CARD */
.mt5-card{background:linear-gradient(135deg,var(--navy3) 0%,var(--navy2) 100%);border:1px solid var(--border);border-radius:14px;padding:24px;position:relative;overflow:hidden;}
.mt5-card::before{content:'MT5';position:absolute;right:-10px;top:-10px;font-size:5rem;font-weight:800;color:rgba(255,255,255,0.03);font-family:'Cormorant Garamond',serif;}
.mt5-label{font-size:0.7rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:14px;}
.mt5-field{margin-bottom:14px;}
.mt5-field:last-child{margin-bottom:0;}
.mt5-field label{font-size:0.72rem;color:var(--grey2);display:block;margin-bottom:5px;}
.mt5-val{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:8px;padding:10px 14px;}
.mt5-val span{flex:1;font-size:0.88rem;font-weight:500;font-family:monospace;}
.mt5-copy{background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.2);color:var(--gold);padding:3px 10px;border-radius:5px;font-size:0.65rem;font-weight:600;cursor:pointer;transition:all 0.2s;font-family:'Outfit',sans-serif;flex-shrink:0;}
.mt5-copy:hover{background:rgba(201,168,76,0.2);}
.mt5-pending{text-align:center;padding:20px;color:var(--grey);font-size:0.85rem;line-height:1.7;}
.mt5-pending strong{color:var(--gold);}

/* RISK TIER DISPLAY */
.risk-display{display:flex;align-items:center;gap:16px;padding:20px;background:rgba(255,255,255,0.02);border-radius:10px;border:1px solid var(--border);}
.risk-pct{font-family:'Cormorant Garamond',serif;font-size:3rem;font-weight:700;line-height:1;}
.risk-info h4{font-weight:600;font-size:0.9rem;margin-bottom:4px;}
.risk-info p{font-size:0.78rem;color:var(--grey);line-height:1.5;}

/* REFERRAL CARD */
.ref-display{text-align:center;padding:24px;}
.ref-id-big{font-family:'Cormorant Garamond',serif;font-size:2.2rem;font-weight:700;color:var(--gold);margin-bottom:8px;letter-spacing:2px;}
.ref-id-sub{font-size:0.78rem;color:var(--grey);margin-bottom:20px;}
.copy-ref-btn{background:var(--gold);color:#0a0a0a;border:none;border-radius:8px;padding:10px 24px;font-size:0.85rem;font-weight:700;cursor:pointer;transition:all 0.25s;font-family:'Outfit',sans-serif;}
.copy-ref-btn:hover{background:var(--gold-light);}
.ref-stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px;}
.ref-stat{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;}
.ref-stat-val{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:700;color:var(--gold);}
.ref-stat-lbl{font-size:0.7rem;color:var(--grey2);text-transform:uppercase;letter-spacing:1px;margin-top:3px;}

/* STATUS TIMELINE */
.timeline{display:flex;flex-direction:column;gap:0;}
.tl-item{display:flex;gap:16px;padding:16px 0;border-bottom:1px solid var(--border);}
.tl-item:last-child{border-bottom:none;}
.tl-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.8rem;flex-shrink:0;margin-top:2px;}
.tl-dot.done{background:rgba(34,197,94,0.15);border:2px solid var(--green);color:var(--green);}
.tl-dot.active{background:rgba(245,158,11,0.15);border:2px solid #f59e0b;color:#f59e0b;}
.tl-dot.wait{background:rgba(255,255,255,0.04);border:2px solid var(--border);color:var(--grey2);}
.tl-body h5{font-weight:600;font-size:0.87rem;margin-bottom:3px;}
.tl-body p{font-size:0.78rem;color:var(--grey);line-height:1.5;}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--navy2);border:1px solid var(--green);border-radius:10px;padding:12px 22px;font-size:0.82rem;color:var(--green);font-weight:500;transition:transform 0.3s;z-index:9999;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:16px;}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* RESPONSIVE */
@media(max-width:1024px){
  .stats{grid-template-columns:repeat(2,1fr);}
  .grid-2,.grid-3{grid-template-columns:1fr;}
}
@media(max-width:768px){
  .sidebar{transform:translateX(-260px);}
  .sidebar.open{transform:translateX(0);}
  .main{margin-left:0;}
  .menu-toggle{display:block;}
  .stats{grid-template-columns:repeat(2,1fr);}
  .content{padding:20px;}
  .topbar{padding:0 20px;}
  .welcome-banner{flex-direction:column;}
  .wb-id{text-align:left;}
}
@media(max-width:480px){
  .stats{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sb-header">
      <a href="index.html" class="sb-logo">
        <img src="logo.png" alt="PPG" onerror="this.style.display='none'">
        <div class="sb-logo-text"><span>PPG Trading Club</span><span>Penny Partners Group</span></div>
      </a>
      <div class="sb-profile">
        <div class="sb-avatar" id="sbAvatar">?</div>
        <div>
          <div class="sb-name" id="sbName">Loading...</div>
          <div class="sb-status" id="sbStatus">Member</div>
        </div>
      </div>
    </div>
    <div class="sb-nav">
      <div class="nav-section">
        <div class="nav-section-label">Main</div>
        <a class="nav-item active" onclick="showTab('overview')"><span class="ni">📊</span> Overview</a>
        <a class="nav-item" onclick="showTab('mt5')"><span class="ni">📈</span> MT5 Access</a>
        <a class="nav-item" onclick="showTab('referral')"><span class="ni">🤝</span> Referral</a>
        <a class="nav-item" onclick="showTab('profile')"><span class="ni">👤</span> My Profile</a>
      </div>
      <div class="nav-section">
        <div class="nav-section-label">Support</div>
        <a class="nav-item" href="https://wa.me/2348130500659" target="_blank"><span class="ni">💬</span> WhatsApp Support</a>
        <a class="nav-item" href="index.html"><span class="ni">🏠</span> Back to Home</a>
      </div>
    </div>
    <div class="sb-footer">
      <button class="logout-btn" onclick="logout()">🚪 Log Out</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
        <div class="topbar-title" id="topbarTitle">Overview</div>
      </div>
      <div class="topbar-right">
        <div class="tb-badge" id="tbRisk">Loading...</div>
        <a href="https://wa.me/2348130500659" target="_blank" class="wa-link">💬 Support</a>
      </div>
    </div>

    <div class="content" id="mainContent">
      <div class="loading"><div class="spinner"></div><p style="color:var(--grey);font-size:0.85rem;">Loading your dashboard...</p></div>
    </div>
  </div>
</div>

<div class="toast" id="toast">✓ Copied!</div>

<script>
const{createClient}=supabase;
const sb=createClient('https://adkptfexitqutwjdexmf.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFka3B0ZmV4aXRxdXR3amRleG1mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwMTczODYsImV4cCI6MjA5NDU5MzM4Nn0.8Zd4QLZb8aImw8ea9RzWkxMVCW5aydpeRaHd7mqJW44');

let member=null;
let currentTab='overview';

window.addEventListener('load',async function(){
  // Check session
  const stored=sessionStorage.getItem('ppg_member');
  if(!stored){window.location.href='login.html';return;}
  try{member=JSON.parse(stored);}catch(e){window.location.href='login.html';return;}

  // Refresh from DB
  const{data,error}=await sb.from('members').select('*').eq('id',member.id).single();
  if(error||!data){window.location.href='login.html';return;}
  member=data;
  sessionStorage.setItem('ppg_member',JSON.stringify(member));

  // Populate UI
  const initials=(member.first_name[0]+(member.last_name[0]||'')).toUpperCase();
  document.getElementById('sbAvatar').textContent=initials;
  document.getElementById('sbName').textContent=member.first_name+' '+member.last_name;
  document.getElementById('sbStatus').textContent=member.status==='approved'?'Active Member':'Pending Approval';
  document.getElementById('tbRisk').textContent=member.risk_tier||'1% Conservative';

  showTab('overview');
});

function showTab(tab){
  currentTab=tab;
  document.querySelectorAll('.nav-item').forEach(i=>i.classList.remove('active'));
  document.querySelectorAll('.nav-item')[['overview','mt5','referral','profile'].indexOf(tab)]?.classList.add('active');
  const titles={overview:'Overview',mt5:'MT5 Access',referral:'Referral Program',profile:'My Profile'};
  document.getElementById('topbarTitle').textContent=titles[tab]||'Dashboard';

  const c=document.getElementById('mainContent');
  if(tab==='overview') c.innerHTML=renderOverview();
  else if(tab==='mt5') c.innerHTML=renderMT5();
  else if(tab==='referral') c.innerHTML=renderReferral();
  else if(tab==='profile') c.innerHTML=renderProfile();
}

function renderOverview(){
  const isPending=member.status==='pending';
  const riskColor={'1% Conservative':'#00d2ff','5% Moderate':'#00c853','10% Balanced':'#ffd600','15% Aggressive':'#ff6d00','20% Maximum':'#d50000'};
  const rc=riskColor[member.risk_tier]||'#00d2ff';

  return `
  <div class="welcome-banner">
    <div class="wb-text">
      <h2>Welcome back, <em>${member.first_name}</em> 👋</h2>
      <p>${isPending?'Your application is under review. Our team will approve within 24–48 hours.':'Your account is active. Trade is being managed on your behalf.'}</p>
    </div>
    <div class="wb-id">
      <div class="wb-id-label">Your Referral ID</div>
      <div class="wb-id-val">
        ${member.referral_id}
        <button class="copy-id" onclick="copyText('${member.referral_id}')">Copy</button>
      </div>
    </div>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="sc-icon" style="background:rgba(201,168,76,0.1);">💰</div>
      <div class="sc-label">Min. Deposit</div>
      <div class="sc-val">$100</div>
      <div class="sc-sub">Into your broker account</div>
    </div>
    <div class="stat-card">
      <div class="sc-icon" style="background:rgba(${rc==='#00d2ff'?'0,210,255':'34,197,94'},0.1);">📊</div>
      <div class="sc-label">Risk Tier</div>
      <div class="sc-val" style="color:${rc};font-size:1.2rem;">${member.risk_tier}</div>
      <div class="sc-sub">Your selected tier</div>
    </div>
    <div class="stat-card">
      <div class="sc-icon" style="background:rgba(34,197,94,0.1);">⏱️</div>
      <div class="sc-label">Withdrawal</div>
      <div class="sc-val">24H</div>
      <div class="sc-sub">When no trades open</div>
    </div>
    <div class="stat-card">
      <div class="sc-icon" style="background:rgba(99,102,241,0.1);">🤝</div>
      <div class="sc-label">Referral Earn</div>
      <div class="sc-val">15%</div>
      <div class="sc-sub">Per referral withdrawal</div>
    </div>
  </div>

  <div class="grid-2">
    <div class="card">
      <div class="card-header">
        <h3>Account Status</h3>
        <div class="card-badge ${isPending?'badge-pending':'badge-approved'}">${isPending?'Pending':'Active'}</div>
      </div>
      <div class="card-body">
        <div class="timeline">
          <div class="tl-item">
            <div class="tl-dot done">✓</div>
            <div class="tl-body"><h5>Registration Submitted</h5><p>Your membership application has been received.</p></div>
          </div>
          <div class="tl-item">
            <div class="tl-dot done">✓</div>
            <div class="tl-body"><h5>Registration Fee Paid</h5><p>$3.99 payment receipt submitted for verification.</p></div>
          </div>
          <div class="tl-item">
            <div class="tl-dot done">✓</div>
            <div class="tl-body"><h5>Risk Consent Signed</h5><p>Full risk disclosure acknowledged on WhatsApp.</p></div>
          </div>
          <div class="tl-item">
            <div class="tl-dot ${isPending?'active':'done'}">${isPending?'⏳':'✓'}</div>
            <div class="tl-body"><h5>KYC Review</h5><p>${isPending?'Your documents are being reviewed. Up to 48 hours.':'Identity verified successfully.'}</p></div>
          </div>
          <div class="tl-item">
            <div class="tl-dot ${member.broker_account_opened?'done':'wait'}">${member.broker_account_opened?'✓':'○'}</div>
            <div class="tl-body"><h5>Broker Account Open</h5><p>${member.broker_account_opened?'Your broker account is set up and active.':'Open your broker account and deposit $100 minimum.'}</p></div>
          </div>
          <div class="tl-item">
            <div class="tl-dot ${member.mt5_login?'done':'wait'}">${member.mt5_login?'✓':'○'}</div>
            <div class="tl-body"><h5>Trading Active</h5><p>${member.mt5_login?'Your account is being managed. Check MT5 Access tab.':'Awaiting broker account deposit to begin trading.'}</p></div>
          </div>
        </div>
      </div>
    </div>

    <div>
