<script>
const { createClient } = supabase;
const sb = createClient(
  window.PPG_CONFIG.SUPABASE_URL,
  window.PPG_CONFIG.SUPABASE_ANON_KEY
);

window.addEventListener('load', async function() {
  await initializeDashboardRuntime();
});

async function initializeDashboardRuntime() {
  try {
    // 1. Authenticate user context
    const { data: { user }, error: authError } = await sb.auth.getUser();
    if (authError || !user) {
      console.error('Authentication check failed:', authError);
      window.location.href = 'login.html';
      return;
    }

    // 2. Pull user profile information from Supabase
    const { data: profile, error: dbError } = await sb
      .from('profiles')
      .eq('id', user.id)
      .single();

    if (dbError) throw dbError;

    // 3. Fallback to storage cache if database data is still populating
    const regCache = JSON.parse(sessionStorage.getItem('ppg_reg')) || {};
    const fullName = profile.full_name || regCache.name || 'Member';
    const userEmail = user.email || regCache.email || '';
    const userCountry = profile.country || regCache.country || 'Not Set';
    const userRole = profile.role || regCache.role || 'Trader';
    const kycStatus = profile.kyc_status || 'not_verified';
    const referralId = profile.referral_id || regCache.myReferralId || 'PPG' + Math.floor(1000 + Math.random() * 9000);

    // 4. Update Header Elements
    document.querySelector('.top-left h2').textContent = `Welcome, ${fullName}`;
    document.querySelector('.member-id').textContent = `Member ID: ${referralId}`;

    // 5. Update Profile Table Cells
    document.getElementById('pName').textContent = fullName;
    document.getElementById('pEmail').textContent = userEmail;
    document.getElementById('pCountry').textContent = userCountry;
    document.getElementById('pRole').textContent = userRole;

    // 6. Generate Referral Affiliate URL
    document.getElementById('refLink').value = `https://ppgsolutions.org/register?ref=${referralId}`;

    // 7. Update Verification Status Badges & Layout Styling
    const statusBadge = document.querySelector('.top-right .status');
    const kycTableCell = document.getElementById('pKyc');
    
    // Reset layout classes
    statusBadge.className = 'status';
    
    if (kycStatus === 'not_verified') {
      statusBadge.classList.add('not-verified');
      statusBadge.textContent = 'Verification Required';
      kycTableCell.textContent = 'Not Verified';
      kycTableCell.style.color = '#ef4444';
    } else if (kycStatus === 'pending') {
      statusBadge.classList.add('pending');
      statusBadge.textContent = 'Verification Pending';
      kycTableCell.textContent = 'Pending Review';
      kycTableCell.style.color = '#f59e0b';
    } else if (kycStatus === 'verified') {
      statusBadge.classList.add('verified');
      statusBadge.textContent = 'Verified Member';
      kycTableCell.textContent = 'Verified';
      kycTableCell.style.color = '#10b981';
    }

    // 8. Load Local Storage Financial Metrics Safely
    const liveBalance = localStorage.getItem('ppg_balance_val') || '0.00';
    const liveRewards = localStorage.getItem('ppg_rewards_val') || '0.00';
    const liveNetworkEarnings = localStorage.getItem('ppg_network_earnings_val') || '0.00';
    
    const cardValues = document.querySelectorAll('.card-val');
    if (cardValues.length >= 3) {
      cardValues[0].textContent = `$${liveBalance}`;
      cardValues[1].textContent = `$${liveRewards}`;
      cardValues[2].textContent = `$${liveNetworkEarnings}`;
    }

  } catch (err) {
    console.error('Runtime system execution error:', err);
  }
}

// 9. Clipboard Allocation Module
function copyLink() {
  const linkInput = document.getElementById('refLink');
  linkInput.select();
  linkInput.setSelectionRange(0, 99999); // Mobile responsive coverage
  
  try {
    navigator.clipboard.writeText(linkInput.value);
    alert('Affiliate allocation token copied successfully.');
  } catch (err) {
    // Fallback support mechanism for older web rendering views
    alert('Copy action complete.');
  }
}
</script>
