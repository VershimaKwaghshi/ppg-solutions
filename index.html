<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPG Solutions | Landing</title>
    <style>
        :root { --bg: #090B0E; --card: #12161A; --blue: #0066FF; --gold: #E5B842; --text: #F5F7FA; --muted: #8A94A6; --border: #1F262E; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 20px; }
        .wrapper { max-width: 500px; margin: 40px auto; }
        .hero { background-color: var(--card); border: 1px solid var(--border); padding: 24px; border-radius: 12px; text-align: center; }
        h1 { font-size: 22px; margin-bottom: 8px; font-weight: 800; }
        p { font-size: 14px; color: var(--muted); margin-bottom: 20px; }
        .cost-badge { font-size: 24px; color: var(--gold); font-weight: 800; margin-bottom: 20px; }
        .btn { display: block; background-color: var(--blue); color: #FFF; text-align: center; padding: 16px; border-radius: 8px; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="hero">
            <h1>PPG Solutions Club</h1>
            <p>Access automated execution infrastructure network copy systems linkups.</p>
            <div class="cost-badge">$3.99 / Month</div>
            <p style="font-size: 12px; margin-top: -10px;">Recurring monthly access contribution subscription mandatory.</p>
            <a href="register.html" class="btn">Initialize Onboarding Protocol</a>
        </div>
    </div>
</body>
</html>
