<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Member Login — PPG</title>
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#040d1c;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
padding:20px;
}
.card{
background:#071428;
border:1px solid rgba(255,255,255,.08);
padding:40px;
border-radius:18px;
width:100%;
max-width:420px;
}
h1{
margin-top:0;
margin-bottom:10px;
}
p{
color:#94a3b8;
line-height:1.6;
margin-bottom:25px;
}
input{
width:100%;
padding:14px;
margin-bottom:15px;
background:#0a1a35;
border:1px solid rgba(255,255,255,.08);
border-radius:8px;
color:white;
box-sizing:border-box;
}
button{
width:100%;
padding:14px;
background:#1640d6;
border:none;
border-radius:8px;
color:white;
font-weight:600;
cursor:pointer;
}
button:hover{
opacity:.92;
}
</style>
</head>
<body>
<div class="card">
<h1>Member Login</h1>
<p>
Login to access your PPG member dashboard.
</p>
<input type="email" placeholder="Email">
<input type="password" placeholder="Password">
<button onclick="window.location='dashboard.html'">
Login
</button>
</div>
</body>
</html>
