<script>
const { createClient } = supabase;

const sb = createClient(
  'https://adkptfexitqutwjdexmf.supabase.co',
  'YOUR_ANON_KEY'
);

function togglePw(id, btn) {
  const f = document.getElementById(id);
  f.type = f.type === 'password' ? 'text' : 'password';
  btn.textContent = f.type === 'password' ? '👁' : '🙈';
}

function checkStr(v) {
  const fill = document.getElementById('pwf');
  const lbl = document.getElementById('pwl');

  let s = 0;

  if (v.length >= 8) s++;
  if (/[A-Z]/.test(v)) s++;
  if (/[0-9]/.test(v)) s++;
  if (/[^A-Za-z0-9]/.test(v)) s++;

  const c = ['#ef4444', '#f97316', '#eab308', '#22c55e'];
  const l = ['Too weak', 'Weak', 'Good', 'Strong'];
  const p = ['25%', '50%', '75%', '100%'];

  if (!v.length) {
    fill.style.width = '0%';
    lbl.textContent = 'Enter a password';
    lbl.style.color = 'var(--grey2)';
    return;
  }

  const i = Math.min(s - 1, 3);

  fill.style.width = p[i];
  fill.style.background = c[i];
  lbl.textContent = l[i];
  lbl.style.color = c[i];

  if (document.getElementById('cf').value) checkMatch();
}

function checkMatch() {
  const pw = document.getElementById('pw').value;
  const cf = document.getElementById('cf').value;

  const el = document.getElementById('pm');
  const inp = document.getElementById('cf');

  if (!cf) {
    el.className = 'pw-match';
    return;
  }

  if (pw === cf) {
    el.textContent = '✓ Passwords match';
    el.className = 'pw-match show ok';
    inp.classList.remove('err');
    inp.classList.add('ok');
  } else {
    el.textContent = '✗ Passwords do not match';
    el.className = 'pw-match show bad';
    inp.classList.remove('ok');
    inp.classList.add('err');
  }
}

function genReferralId() {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';

  let id = 'PPG-';

  for (let i = 0; i < 6; i++) {
    id += chars[Math.floor(Math.random() * chars.length)];
  }

  return id;
}

function validate() {
  let ok = true;

  const checks = [
    { id: 'fn', wrap: 'ff', fn: v => v.trim().length > 1 },
    { id: 'ln', wrap: 'fl', fn: v => v.trim().length > 1 },
    { id: 'em', wrap: 'fe', fn: v => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v) },
    { id: 'ph', wrap: 'fp', fn: v => v.trim().length > 6 },
    { id: 'co', wrap: 'fc', fn: v => v !== '' },
    { id: 'pw', wrap: 'fpw', fn: v => v.length >= 8 },
    { id: 'ref', wrap: 'fr', fn: v => v.trim().length > 2 }
  ];

  checks.forEach(c => {
    const v = document.getElementById(c.id).value;
    const w = document.getElementById(c.wrap);

    if (!c.fn(v)) {
      w.classList.add('he');
      ok = false;
    } else {
      w.classList.remove('he');
    }
  });

  const pw = document.getElementById('pw').value;
  const cf = document.getElementById('cf').value;

  const cfw = document.getElementById('fcf');

  if (pw !== cf || !cf) {
    cfw.classList.add('he');
    ok = false;
  } else {
    cfw.classList.remove('he');
  }

  return ok;
}

async function handleSubmit() {

  if (!validate()) {
    document.querySelector('.he')?.scrollIntoView({
      behavior: 'smooth',
      block: 'center'
    });

    return;
  }

  const btn = document.getElementById('sbtn');

  btn.disabled = true;
  btn.textContent = 'Creating your account...';

  try {

    const fn = document.getElementById('fn').value.trim();
    const ln = document.getElementById('ln').value.trim();

    const em = document.getElementById('em')
      .value
      .trim()
      .toLowerCase();

    const ph = document.getElementById('ph').value.trim();

    const co = document.getElementById('co').value;

    const pw = document.getElementById('pw').value;

    const ref = document.getElementById('ref')
      .value
      .trim()
      .toUpperCase();

    const risk = document.querySelector(
      'input[name="risk"]:checked'
    ).value;

    const myReferralId = genReferralId();

    // CHECK REFERRAL EXISTS

    const { data: refUser, error: refErr } = await sb
      .from('profiles')
      .select('id')
      .eq('referral_id', ref)
      .single();

    if (refErr || !refUser) {
      showErr('Invalid referral ID.');
      resetBtn();
      return;
    }

    // CHECK EMAIL EXISTS

    const { data: existing } = await sb
      .from('profiles')
      .select('id')
      .eq('email', em);

    if (existing && existing.length > 0) {
      showErr('An account with this email already exists.');
      resetBtn();
      return;
    }

    // CREATE AUTH USER

    const { data: authData, error: authError } =
      await sb.auth.signUp({
        email: em,
        password: pw
      });

    if (authError) {
      showErr(authError.message);
      resetBtn();
      return;
    }

    const user = authData.user;

    if (!user) {
      showErr('Failed to create account.');
      resetBtn();
      return;
    }

    // CREATE PROFILE

    const { error: profileError } = await sb
      .from('profiles')
      .insert({
        id: user.id,

        first_name: fn,
        last_name: ln,

        full_name: fn + ' ' + ln,

        email: em,

        phone: ph,

        country: co,

        risk_tier: risk,

        referral_id: myReferralId,

        referred_by: ref,

        payment_method: 'Crypto Stream',

        membership_status: 'pending_payment',

        created_at: new Date().toISOString()
      });

    if (profileError) {

      showErr(profileError.message);

      resetBtn();

      return;
    }

    // STORE SESSION

    sessionStorage.setItem(
      'ppg_reg',
      JSON.stringify({
        memberId: user.id,
        email: em,
        name: fn + ' ' + ln,
        referral: ref,
        myReferralId,
        risk
      })
    );

    window.location.href = 'payment.html';

  } catch (err) {

    showErr('Unexpected error occurred.');

    console.error(err);

    resetBtn();
  }
}

function resetBtn() {
  const btn = document.getElementById('sbtn');

  btn.disabled = false;

  btn.textContent = 'Create My Account →';
}

function showErr(msg) {

  const el = document.getElementById('eb');

  el.textContent = msg;

  el.classList.add('show');

  el.scrollIntoView({
    behavior: 'smooth',
    block: 'center'
  });
}

document
  .getElementById('ref')
  .addEventListener('input', function () {
    this.value = this.value.toUpperCase();
  });
</script>
