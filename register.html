<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="auth.js"></script>
<script>
function togglePw(id,btn){const f=document.getElementById(id);f.type=f.type==='password'?'text':'password';btn.textContent=f.type==='password'?'👁':'🙈';}

function checkStr(v){
  const fill=document.getElementById('pwf');const lbl=document.getElementById('pwl');
  let s=0;if(v.length>=8)s++;if(/[A-Z]/.test(v))s++;if(/[0-9]/.test(v))s++;if(/[^A-Za-z0-9]/.test(v))s++;
  const c=['#ef4444','#f97316','#eab308','#22c55e'];const l=['Too weak','Weak','Good','Strong'];const p=['25%','50%','75%','100%'];
  if(!v.length){fill.style.width='0%';lbl.textContent='Enter a password';lbl.style.color='var(--grey2)';return;}
  const i=Math.min(s-1,3);fill.style.width=p[i];fill.style.background=c[i];lbl.textContent=l[i];lbl.style.color=c[i];
  if(document.getElementById('cf').value)checkMatch();
}

function checkMatch(){
  const pw=document.getElementById('pw').value;const cf=document.getElementById('cf').value;
  const el=document.getElementById('pm');const inp=document.getElementById('cf');
  if(!cf){el.className='pw-match';return;}
  if(pw===cf){el.textContent='✓ Passwords match';el.className='pw-match show ok';inp.classList.remove('err');inp.classList.add('ok');}
  else{el.textContent='✗ Passwords do not match';el.className='pw-match show bad';inp.classList.remove('ok');inp.classList.add('err');}
}

function validate(){
  let ok=true;
  const checks=[
    {id:'fn',wrap:'ff',fn:v=>v.trim().length>1},
    {id:'ln',wrap:'fl',fn:v=>v.trim().length>1},
    {id:'em',wrap:'fe',fn:v=>/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)},
    {id:'ph',wrap:'fp',fn:v=>v.trim().length>6},
    {id:'co',wrap:'fc',fn:v=>v!==''},
    {id:'role',wrap:'frl',fn:v=>v!==''},
    {id:'pw',wrap:'fpw',fn:v=>v.length>=8},
    {id:'ref',wrap:'fr',fn:v=>v.trim().length>2},
  ];
  checks.forEach(c=>{
    const v=document.getElementById(c.id).value;
    const w=document.getElementById(c.wrap);
    if(!c.fn(v)){w.classList.add('has-error');ok=false;}else{w.classList.remove('has-error');}
  });
  const pw=document.getElementById('pw').value;const cf=document.getElementById('cf').value;
  const cfw=document.getElementById('fcf');
  if(pw!==cf||!cf){cfw.classList.add('has-error');ok=false;}else{cfw.classList.remove('has-error');}
  return ok;
}

async function handleSubmit(){
  if(!validate()){document.querySelector('.has-error')?.scrollIntoView({behavior:'smooth',block:'center'});return;}
  const btn=document.getElementById('sbtn');
  btn.disabled=true;btn.textContent='Creating your account...';

  const userData = {
    firstName: document.getElementById('fn').value.trim(),
    lastName: document.getElementById('ln').value.trim(),
    email: document.getElementById('em').value.trim().toLowerCase(),
    phone: document.getElementById('ph').value.trim(),
    country: document.getElementById('co').value,
    role: document.getElementById('role').value,
    password: document.getElementById('pw').value,
    referral: document.getElementById('ref').value.trim().toUpperCase(),
    risk: document.querySelector('input[name="risk"]:checked').value
  };

  try {
    const res = await registerUser(userData);
    
    if (res.success) {
      sessionStorage.setItem('ppg_reg', JSON.stringify({
        name: userData.firstName + ' ' + userData.lastName,
        email: userData.email,
        referral: userData.referral,
        risk: userData.risk,
        myReferralId: res.referralCode,
        memberId: res.user.id,
        role: userData.role
      }));
      
      window.location.href = 'payment.html';
    }
  } catch (err) {
    showErr(err.message);
    btn.disabled = false;
    btn.textContent = 'Create My Account →';
  }
}

function showErr(msg){const el=document.getElementById('eb');el.textContent=msg;el.style.display='block';el.scrollIntoView({behavior:'smooth',block:'center'});}
document.getElementById('ref').addEventListener('input',function(){this.value=this.value.toUpperCase();});
</script>
